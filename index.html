<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="국민연금 보유 종목 추정치와 현재 수익률 추정치, 관련 뉴스를 한 눈에 확인하는 대시보드"
  />
  <title>Where Is Invest | 국민연금 투자 추정 현황</title>
  <link href="/style.css" rel="stylesheet" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Where Is Invest</h1>
      <p class="subtitle">국민연금 투자 추정 현황 대시보드</p>
    </div>
    <div class="topbar-actions">
      <p id="last-updated">마지막 갱신: -</p>
      <button id="refresh-button" type="button">지금 새로고침</button>
    </div>
  </header>
  <p id="system-status" class="system-status">초기 데이터를 불러오는 중입니다...</p>

  <main class="layout">
    <section class="panel panel-left">
      <h2>보유 종목</h2>
      <p class="panel-description">
        공시 데이터와 시세 기반으로 계산한 추정 보유 내역/수익률을 제공합니다.
      </p>
      <div class="stock-controls" aria-label="종목 필터 및 정렬">
        <input id="stock-search" type="search" placeholder="종목명/티커 검색" />
        <select id="stock-sort">
          <option value="return_desc">수익률 높은순</option>
          <option value="return_asc">수익률 낮은순</option>
          <option value="value_desc">평가금액 높은순</option>
          <option value="name_asc">종목명 오름차순</option>
        </select>
        <select id="return-filter">
          <option value="all">전체 수익률</option>
          <option value="gain">수익 종목만</option>
          <option value="loss">손실 종목만</option>
          <option value="flat">보합 종목만</option>
        </select>
      </div>
      <p id="stock-summary" class="stock-summary"></p>
      <div id="stock-list" class="stock-list"></div>
    </section>

    <aside class="panel panel-right">
      <h2>관련 뉴스</h2>
      <p class="panel-description">
        종목 클릭 시 해당 종목 중심 뉴스로 정렬됩니다.
      </p>
      <p id="news-status" class="news-status"></p>
      <div id="news-list" class="news-list"></div>

      <section class="source-box" aria-label="데이터 출처">
        <h3>데이터 출처</h3>
        <p id="reliability-note" class="source-note"></p>
        <ul id="source-list" class="source-list"></ul>
      </section>

      <section class="ad-box" aria-label="광고 영역">
        <h3>광고</h3>
        <p class="ad-note">
          광고 설정은 <code>config.js</code>에서 관리됩니다.
        </p>
        <ins
          class="adsbygoogle ad-slot"
          style="display:block"
          data-ad-format="auto"
          data-full-width-responsive="true"
        ></ins>
      </section>

      <section class="contact-box" aria-label="문의하기">
        <h3>문의하기</h3>
        <p class="contact-note">
          오류 제보/제휴 문의는 아래 폼으로 보내주세요.
        </p>
        <form id="contact-form" action="#" method="POST">
          <input type="text" name="name" placeholder="이름 (선택)" />
          <input type="email" name="email" placeholder="이메일" required />
          <textarea name="message" rows="4" placeholder="문의 내용을 입력해 주세요." required></textarea>
          <button id="contact-submit" type="submit">문의 보내기</button>
        </form>
        <p id="contact-status" class="contact-status"></p>
      </section>
    </aside>
  </main>

  <footer class="site-footer">
    <a href="/privacy.html">개인정보처리방침</a>
    <a href="/disclaimer.html">면책 고지</a>
  </footer>

  <template id="stock-item-template">
    <article class="stock-item">
      <button class="stock-head" type="button">
        <span class="stock-name"></span>
        <span class="stock-return"></span>
      </button>
      <div class="stock-detail">
        <dl>
          <div><dt>보유 수량</dt><dd class="holding-qty"></dd></div>
          <div><dt>매입 단가</dt><dd class="buy-price"></dd></div>
          <div><dt>현재 가격</dt><dd class="current-price"></dd></div>
          <div><dt>수익률</dt><dd class="return-rate"></dd></div>
          <div><dt>기준일</dt><dd class="snapshot-date"></dd></div>
        </dl>
      </div>
    </article>
  </template>

  <script defer type="text/javascript" src="/config.js"></script>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
